# Maps Fusion API classes to domain files via glob patterns.
# Classes not matching any pattern go to fusion-misc.lap.

core:
  - Application
  - Document
  - Base
  - "*Input"
  - "Point*"
  - "Vector*"
  - "Matrix*"
  - ObjectCollection
  - Color
  - Viewport
  - Camera

sketch:
  - "Sketch*"
  - "*Constraint"
  - "*Dimension"
  - "Profile*"
  - "GeometricConstraint*"
  - "DimensionConstraint*"

features:
  - "*Feature"
  - "*Features"
  - "*FeatureInput"
  - ExtentDefinition
  - "*Extent"

bodies:
  - "BRep*"
  - "Mesh*"
  - "TSpline*"
  - SurfaceBody

assembly:
  - Component
  - Occurrence
  - "*Joint*"
  - RigidGroup
  - ContactSet

cam:
  - "CAM*"
  - Operation
  - Toolpath
  - Tool
  - "*Post*"
  - NCProgram
  - Setup

drawing:
  - "Drawing*"
  - "*Annotation*"
  - "*Table"

ui:
  - Command
  - "*CommandInput*"
  - Palette
  - Toolbar
  - "*Event*"
  - UserInterface
  - ToolbarPanel
  - ToolbarTab
